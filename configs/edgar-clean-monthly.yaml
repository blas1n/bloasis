# BLOASIS Production: EDGAR cosine + monthly rebalance.
#
# PR19 axis B (rebalance_days) applied on top of PR18's edgar-clean.
# Reproduces Chitsiripanich-Paolella 2024 "smoothing momentum" finding:
# longer rebalance window cuts turnover, lifts alpha and sharpe with
# unchanged DD.
#
# Measurement (SP500, 2022-2024, 7 walk-forward folds):
#                       daily     monthly (this)
#   alpha               +1.49%    +2.92%   ← 2× boost
#   sharpe              0.997     1.015    ← live-gate 1.0 cleared
#   DD ratio to SPY     0.802     0.800    ← unchanged
#   passed paper-gate   YES       YES
#
# First bloasis config to clear live-gate sharpe (1.0) AND paper-gate.

universe:
  source: sp500
  custom_csv_path: null

pre_filter:
  min_market_cap: 1_000_000_000
  max_pe_ratio: 10000
  min_dollar_volume: 5_000_000
  exclude_sectors: []

scorer:
  type: edgar_textdiff
  ml_model_path: null
  edgar_textdiff_top_pct: 0.10
  edgar_filing_lag_days: 90
  weights:
    value: 0.0
    quality: 1.0
    momentum: 0.0
    technical: 0.0
    volatility: 0.0
    liquidity: 0.0
    sentiment: 0.0
  regime_multipliers: {}
  thresholds:
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    strong_momentum_20d: 0.10
    high_volatility_ann: 0.40
    elevated_vix: 25.0
    high_leverage_de: 2.0
    strong_trend_adx: 25.0
  entry_threshold: 0.65
  exit_threshold: 0.40

regime_overlay:
  enabled: false
  sigma_target: 0.12
  vol_lookback_days: 126
  bear_lookback_days: 504
  bear_scale: 0.5
  scale_clip: [0.0, 1.5]

signal:
  atr_stop_multiplier: 100.0
  atr_tp_multiplier: 100.0
  position_size_max_pct: 0.02
  profit_tiers: []
  rebalance_days: 21        # PR19 — monthly rebalance

risk:
  vix_extreme: 40.0
  vix_high: 30.0
  max_single_order_pct: 0.02
  max_sector_concentration: 1.0

execution:
  fill_mode: limit_with_fallback
  market_slippage_bps: 0
  limit_offset_bps: 0
  limit_timeout_bars: 1
  fees_bps: 0
  initial_capital: 10000.0

data:
  cache_dir: ~/.cache/bloasis
  ohlcv_cache_max_age_hours: 24
  fundamentals_cache_max_age_hours: 24
  sentiment_cache_max_age_hours: 6
  finnhub_rate_per_minute: 60
  sentiment_lookback_days: 7

allocation:
  strategies:
    - {name: bloasis_smart_beta, type: strategy, weight: 1.00}

acceptance_criteria:
  walk_forward_min_folds: 5
  median_alpha_annualized: -0.005
  median_sharpe_vs_spy: 0.7
  median_max_dd_ratio_to_spy: 0.85
