# BLOASIS Phase 3 Candidate A — PEAD (Post-Earnings Announcement Drift).
#
# Stocks with a recent positive earnings surprise drift upward for ~60d.
# Top decile of `last_eps_surprise_pct` (where days_since_earnings <= 60
# AND surprise_pct > 0) → score 0.99, rest 0.0.
#
# Spec: ~/Docs/bloasis/Phase3_Modern_Candidates_2026-05-08.md §A
#
# yfinance limit: ~2-3 yrs historical earnings → multi-year backtest
# stretched. First check: 2022-2024 walk-forward.

universe:
  source: sp500
  custom_csv_path: null

pre_filter:
  min_market_cap: 1_000_000_000
  max_pe_ratio: 10000
  min_dollar_volume: 5_000_000
  exclude_sectors: []

scorer:
  type: pead
  ml_model_path: null
  pead_top_pct: 0.10
  pead_drift_days: 60

  weights:
    value: 0.0
    quality: 0.0
    momentum: 0.0
    technical: 0.0
    volatility: 0.0
    liquidity: 0.0
    sentiment: 1.0   # unused; schema demands a positive entry
  regime_multipliers: {}
  thresholds:
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    strong_momentum_20d: 0.10
    high_volatility_ann: 0.40
    elevated_vix: 25.0
    high_leverage_de: 2.0
    strong_trend_adx: 25.0
  entry_threshold: 0.65
  exit_threshold: 0.40

regime_overlay:
  enabled: false
  sigma_target: 0.12
  vol_lookback_days: 126
  bear_lookback_days: 504
  bear_scale: 0.5
  scale_clip: [0.0, 1.5]

signal:
  atr_stop_multiplier: 2.0
  atr_tp_multiplier: 3.0
  position_size_max_pct: 0.10
  profit_tiers:
    - {fraction: 0.33, type: target,   atr_mult: 1.5}
    - {fraction: 0.33, type: target,   atr_mult: 3.0}
    - {fraction: 0.34, type: trailing, atr_mult: 2.0}

risk:
  vix_extreme: 40.0
  vix_high: 30.0
  max_single_order_pct: 0.10
  max_sector_concentration: 0.30

execution:
  fill_mode: limit_with_fallback
  market_slippage_bps: 5
  limit_offset_bps: 10
  limit_timeout_bars: 1
  fees_bps: 0
  initial_capital: 10000.0

data:
  cache_dir: ~/.cache/bloasis
  ohlcv_cache_max_age_hours: 24
  fundamentals_cache_max_age_hours: 24
  sentiment_cache_max_age_hours: 6
  finnhub_rate_per_minute: 60
  sentiment_lookback_days: 7

allocation:
  strategies:
    - {name: bloasis_smart_beta, type: strategy, weight: 1.00}

acceptance_criteria:
  walk_forward_min_folds: 5
  median_alpha_annualized: -0.005
  median_sharpe_vs_spy: 0.7
  median_max_dd_ratio_to_spy: 0.85
