# BLOASIS Production: EDGAR cosine + monthly rebalance + rolling_window=2.
#
# PR20 axis A (edgar_rolling_window) layered on PR19's edgar-clean-monthly.
# Averaging cosine across the two most recent 10-K YoY pairs smooths
# one-off filings dialect noise and isolates the persistent
# disclosure-shift signal.
#
# Measurement (SP500, 2022-2024, 7 walk-forward folds):
#                       PR19 monthly  PR20 rolling=2 (this)
#   alpha               +2.92%        +4.09%   ← +1.17pp
#   sharpe              1.015         1.334    ← +0.32
#   DD ratio to SPY     0.800         0.80     ← unchanged
#   passed live-gate    NO (DD)       YES      ← all 4 PASS
#
# First bloasis config to clear live-gate (sharpe ≥ 1.0, α ≥ -0.5%, DD ≤ 0.85).

universe:
  source: sp500
  custom_csv_path: null

pre_filter:
  min_market_cap: 1_000_000_000
  max_pe_ratio: 10000
  min_dollar_volume: 5_000_000
  exclude_sectors: []

scorer:
  type: edgar_textdiff
  ml_model_path: null
  edgar_textdiff_top_pct: 0.10
  edgar_filing_lag_days: 90
  edgar_rolling_window: 2
  weights:
    value: 0.0
    quality: 1.0
    momentum: 0.0
    technical: 0.0
    volatility: 0.0
    liquidity: 0.0
    sentiment: 0.0
  regime_multipliers: {}
  thresholds:
    rsi_oversold: 30.0
    rsi_overbought: 70.0
    strong_momentum_20d: 0.10
    high_volatility_ann: 0.40
    elevated_vix: 25.0
    high_leverage_de: 2.0
    strong_trend_adx: 25.0
  entry_threshold: 0.65
  exit_threshold: 0.40

regime_overlay:
  enabled: false
  sigma_target: 0.12
  vol_lookback_days: 126
  bear_lookback_days: 504
  bear_scale: 0.5
  scale_clip: [0.0, 1.5]

signal:
  atr_stop_multiplier: 100.0
  atr_tp_multiplier: 100.0
  position_size_max_pct: 0.02
  profit_tiers: []
  rebalance_days: 21        # PR19 — monthly rebalance

risk:
  vix_extreme: 40.0
  vix_high: 30.0
  max_single_order_pct: 0.02
  max_sector_concentration: 1.0

execution:
  fill_mode: limit_with_fallback
  market_slippage_bps: 0
  limit_offset_bps: 0
  limit_timeout_bars: 1
  fees_bps: 0
  initial_capital: 10000.0

data:
  cache_dir: ~/.cache/bloasis
  ohlcv_cache_max_age_hours: 24
  fundamentals_cache_max_age_hours: 24
  sentiment_cache_max_age_hours: 6
  finnhub_rate_per_minute: 60
  sentiment_lookback_days: 7

allocation:
  strategies:
    - {name: bloasis_smart_beta, type: strategy, weight: 1.00}

acceptance_criteria:
  walk_forward_min_folds: 5
  median_alpha_annualized: -0.005
  median_sharpe_vs_spy: 0.7
  median_max_dd_ratio_to_spy: 0.85
