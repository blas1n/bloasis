name: CI

on:
  push:
    branches: [main, "refactor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --extra data --extra llm

      - name: Lint (ruff)
        run: uv run ruff check bloasis/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check bloasis/ tests/

      - name: Type check (mypy strict)
        run: uv run mypy bloasis/

      - name: Test
        run: uv run pytest tests/
