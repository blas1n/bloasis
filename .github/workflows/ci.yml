name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential wget
          wget -q https://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr
          make
          sudo make install
          cd ..
          rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check app/ shared/
          ruff format --check app/ shared/

      - name: Type check (mypy)
        run: mypy app/ shared/

      - name: Test (pytest)
        run: pytest app/ --cov=app --cov-fail-under=80

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential wget
          wget -q https://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr
          make
          sudo make install
          cd ..
          rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv pip install --system ".[dev]"

      - name: Generate OpenAPI schema
        run: PYTHONPATH=/workspace python scripts/export_openapi.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate API types
        working-directory: frontend
        run: npm run generate:api

      - name: Type check (tsc)
        working-directory: frontend
        run: npm run type-check
