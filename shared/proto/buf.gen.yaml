# buf.gen.yaml - Code generation configuration
# https://buf.build/docs/configuration/v1/buf-gen-yaml

version: v1

# Managed mode - automatic package/import management
managed:
  enabled: true

# Code generation plugins
plugins:
  # Python protobuf (pinned to v31 for protobuf 6.x runtime compatibility)
  - plugin: buf.build/protocolbuffers/python:v31.1
    out: ../generated

  # Python gRPC (pinned to match protobuf version)
  - plugin: buf.build/grpc/python:v1.76.0
    out: ../generated

  # Python type stubs (.pyi) for IDE support
  - plugin: buf.build/community/nipunn1313-mypy
    out: ../generated
