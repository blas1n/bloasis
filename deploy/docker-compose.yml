# =============================================================================
# BLOASIS Production Docker Compose (Monolith)
# =============================================================================
# Single FastAPI app + PostgreSQL + Redis
#
# Profiles:
#   - default: Core (app + postgres + redis)
#   - monitoring: + Prometheus + Grafana + exporters
#   - full: + frontend
#
# Usage:
#   docker-compose up -d                           # Core
#   docker-compose --profile monitoring up -d      # With monitoring
#   docker-compose --profile full up -d            # Everything
# =============================================================================

services:
  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: bloasis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bloasis}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - bloasis-network

  redis:
    image: redis:7-alpine
    container_name: bloasis-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru 
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - bloasis-network

  # ===========================================================================
  # Application (single FastAPI monolith)
  # ===========================================================================

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: bloasis-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bloasis}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-haiku-4-5-20251001}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt-public.pem
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_PAPER: ${ALPACA_PAPER:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ../logs:/logs
      - ../infra/keys/jwt-private.pem:/run/secrets/jwt-private.pem:ro
      - ../infra/keys/jwt-public.pem:/run/secrets/jwt-public.pem:ro
    networks:
      - bloasis-network

  # ===========================================================================
  # Frontend (full profile only)
  # ===========================================================================

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: bloasis-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://app:8000
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - bloasis-network

  # ===========================================================================
  # Monitoring Stack (monitoring/full profiles)
  # ===========================================================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: bloasis-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ../infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../infra/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - monitoring
      - full
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - bloasis-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: bloasis-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../infra/monitoring/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../infra/monitoring/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring
      - full
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - bloasis-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: bloasis-redis-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9121:9121"
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - monitoring
      - full
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    networks:
      - bloasis-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: bloasis-postgres-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bloasis}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - monitoring
      - full
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    networks:
      - bloasis-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    name: bloasis-postgres-data
  redis-data:
    name: bloasis-redis-data
  prometheus-data:
    name: bloasis-prometheus-data
  grafana-data:
    name: bloasis-grafana-data

# =============================================================================
# Networks
# =============================================================================
networks:
  bloasis-network:
    driver: bridge
    name: bloasis-network
