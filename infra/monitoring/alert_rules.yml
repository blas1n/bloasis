groups:
- name: service_health
  interval: 30s
  rules:
  - alert: ServiceDown
    expr: up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Service {{ $labels.job }} is down
      description: '{{ $labels.instance }} of job {{ $labels.job }} has been down
        for more than 1 minute.'
  - alert: ServiceFlapping
    expr: changes(up[10m]) > 3
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Service {{ $labels.job }} is flapping
      description: '{{ $labels.instance }} has restarted more than 3 times in the
        last 10 minutes.'
- name: trading_operations
  interval: 1m
  rules:
  - alert: NoTradesExecuted
    expr: 'increase(orders_executed_total[2h]) == 0

      and on() (hour() >= 14 and hour() < 21)

      and on() (day_of_week() >= 1 and day_of_week() <= 5)

      '
    for: 2h
    labels:
      severity: warning
    annotations:
      summary: No trades executed in 2 hours during market hours
      description: No orders have been executed in the last 2 hours during US market
        hours. This may indicate a trading system issue.
  - alert: HighRejectionRate
    expr: 'sum(rate(risk_committee_decisions_total{decision="rejected"}[1h]))

      /

      sum(rate(risk_committee_decisions_total[1h]))

      > 0.5

      '
    for: 30m
    labels:
      severity: warning
    annotations:
      summary: High risk committee rejection rate
      description: 'Risk committee is rejecting more than 50% of trade proposals for
        30 minutes. Current: {{ $value | humanizePercentage }}'
  - alert: NoTradingSignals
    expr: 'increase(trading_signals_generated_total[1h]) == 0

      and on() (hour() >= 14 and hour() < 21)

      and on() (day_of_week() >= 1 and day_of_week() <= 5)

      '
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: No trading signals generated in 1 hour
      description: Strategy service has not generated any trading signals in the last
        hour during market hours.
  - alert: PortfolioValueDrop
    expr: '(portfolio_value_total - portfolio_value_total offset 1h)

      /

      portfolio_value_total offset 1h

      < -0.05

      '
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Significant portfolio value drop detected
      description: 'Portfolio value has dropped more than 5% in the last hour. Current
        change: {{ $value | humanizePercentage }}'
- name: infrastructure
  interval: 30s
  rules:
  - alert: LowCacheHitRate
    expr: 'rate(redis_keyspace_hits_total[5m])

      /

      (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))

      < 0.7

      '
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: Low Redis cache hit rate
      description: 'Redis cache hit rate is below 70% for 10 minutes. Current: {{
        $value | humanizePercentage }}'
  - alert: RedisHighMemoryUsage
    expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: High Redis memory usage
      description: 'Redis is using more than 80% of available memory. Current: {{
        $value | humanizePercentage }}'
  - alert: PostgresConnectionPoolExhausted
    expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: PostgreSQL connection pool near exhaustion
      description: 'PostgreSQL is using more than 80% of max connections. Current:
        {{ $value | humanizePercentage }}'
  - alert: PostgresSlowQueries
    expr: rate(pg_stat_statements_seconds_total[5m]) / rate(pg_stat_statements_calls_total[5m])
      > 1
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: PostgreSQL slow queries detected
      description: Average query time is above 1 second for 10 minutes.
- name: resource_usage
  interval: 30s
  rules:
  - alert: HighCPUUsage
    expr: '100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))
      * 100) > 80

      '
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: High CPU usage on {{ $labels.instance }}
      description: 'CPU usage is above 80% for 10 minutes. Current: {{ $value | humanize
        }}%'
  - alert: HighMemoryUsage
    expr: '(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
      > 85

      '
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: High memory usage on {{ $labels.instance }}
      description: 'Memory usage is above 85% for 10 minutes. Current: {{ $value |
        humanize }}%'
  - alert: DiskSpaceLow
    expr: '(1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"}))
      * 100 > 80

      '
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: Disk space running low on {{ $labels.instance }}
      description: 'Disk usage is above 80% on {{ $labels.mountpoint }}. Current:
        {{ $value | humanize }}%'
