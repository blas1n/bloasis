# Prometheus Configuration for BLOASIS Trading Platform
# Scrapes metrics from FastAPI monolith, Redis, and PostgreSQL

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bloasis-monitor'

# Alertmanager configuration (optional, for future use)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # =============================================================================
  # Prometheus Self-Monitoring
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # =============================================================================
  # FastAPI Monolith
  # =============================================================================
  - job_name: 'app'
    static_configs:
      - targets: ['app:8000']
        labels:
          service: 'app'
          type: 'http'
    metrics_path: /metrics
    scrape_interval: 15s

  # =============================================================================
  # Infrastructure Services
  # =============================================================================

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          type: 'cache'
    scrape_interval: 15s

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          type: 'database'
    scrape_interval: 15s
